<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 迷宫 · 第三人称</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: "Microsoft YaHei", monospace; }
  .panel {
    position: fixed; color: #fff; z-index: 10; pointer-events: none;
    background: rgba(0,0,0,.45); border-radius: 8px; padding: 8px 12px;
    backdrop-filter: blur(4px);
  }
  #hud { top: 12px; left: 12px; font-size: 15px; }
  #hud b { color: #ffd76a; }
  #tips { bottom: 12px; left: 12px; font-size: 13px; line-height: 1.8; opacity: .95; }
  #tips .key {
    display: inline-block; background: #fff; color: #000; border-radius: 4px;
    padding: 0 6px; margin-right: 4px; font-weight: bold; font-size: 12px;
  }
  #minimap-box { top: 12px; right: 12px; padding: 6px; }
  #minimap { display: block; border-radius: 4px; }
  .screen {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: rgba(0,0,0,.7); color: #fff; z-index: 20;
    text-align: center; cursor: pointer;
  }
  .screen h1 { margin: 0; font-size: 40px; }
  .screen p { margin: 0; opacity: .85; font-size: 15px; }
  .screen .btn {
    margin-top: 8px; padding: 10px 36px; border: 2px solid #ffd76a;
    border-radius: 999px; color: #ffd76a; font-size: 18px;
  }
  #win { display: none; }
</style>
</head>
<body>
<div id="hud" class="panel">第 <b id="level">1</b> 关 &nbsp;|&nbsp; ⏱ <b id="time">0.0</b>s &nbsp;|&nbsp; 目标: 找到 <b>金色光球</b></div>
<div id="minimap-box" class="panel"><canvas id="minimap" width="160" height="160"></canvas></div>
<div id="tips" class="panel">
  <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动 &nbsp;
  <span class="key">鼠标</span> 旋转视角 &nbsp;
  <span class="key">Shift</span> 加速 &nbsp;
  <span class="key">Esc</span> 释放鼠标
</div>

<div id="start" class="screen">
  <h1>3D 迷宫</h1>
  <p>控制小人走出迷宫 · 金色光球就是出口</p>
  <p>每过一关迷宫更大、雾更浓 · 第 3 关起小地图隐藏出口</p>
  <p>WASD 移动 · 鼠标转视角 · Shift 加速</p>
  <div class="btn">点击开始</div>
</div>
<div id="win" class="screen">
  <h1 id="win-title">🎉 过关!</h1>
  <p id="win-time"></p>
  <div class="btn" id="win-btn">进入下一关</div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const CELL = 4, WALL_H = 3;
let SIZE = 9, level = 1, showExitOnMap = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2338);
scene.fog = new THREE.Fog(0x1a2338, 25, 90);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// 更亮的光照
scene.add(new THREE.HemisphereLight(0xcdd8ff, 0x8a7a5a, 1.1));
const sun = new THREE.DirectionalLight(0xfff2dd, 1.6);
sun.position.set(30, 60, 20);
sun.castShadow = true;
sun.shadow.camera.left = sun.shadow.camera.bottom = -45;
sun.shadow.camera.right = sun.shadow.camera.top = 45;
sun.shadow.mapSize.set(2048, 2048);
scene.add(sun);

let maze, walls, floor, exitMesh, exitLight;
let player, parts = {};
let startTime = 0, playing = false, won = false;
const playerPos = new THREE.Vector3(CELL, 0, CELL);

function genMaze(n) {
  const g = Array.from({ length: n }, () => Array(n).fill(1));
  const stack = [[1, 1]];
  g[1][1] = 0;
  while (stack.length) {
    const [x, y] = stack[stack.length - 1];
    const dirs = [[2,0],[-2,0],[0,2],[0,-2]]
      .filter(([dx,dy]) => x+dx > 0 && x+dx < n-1 && y+dy > 0 && y+dy < n-1 && g[y+dy][x+dx] === 1);
    if (!dirs.length) { stack.pop(); continue; }
    const [dx, dy] = dirs[Math.random() * dirs.length | 0];
    g[y + dy/2][x + dx/2] = 0;
    g[y + dy][x + dx] = 0;
    stack.push([x + dx, y + dy]);
  }
  return g;
}

function makeFloorTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#3d4a63'; ctx.fillRect(0, 0, 256, 256);
  ctx.fillStyle = '#46536e'; ctx.fillRect(0, 0, 128, 128); ctx.fillRect(128, 128, 128, 128);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(SIZE, SIZE);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

let exitPos;
function build() {
  // 难度: 迷宫变大 + 雾变浓 + 第3关起小地图不显示出口
  SIZE = Math.min(9 + (level - 1) * 2, 41);
  const fogFar = Math.max(30, 90 - (level - 1) * 10);
  scene.fog.near = Math.max(8, fogFar - 60);
  scene.fog.far = fogFar;
  showExitOnMap = level < 3;
  sun.shadow.camera.left = sun.shadow.camera.bottom = -SIZE * CELL / 2 - 5;
  sun.shadow.camera.right = sun.shadow.camera.top = SIZE * CELL / 2 + 5;
  sun.shadow.camera.updateProjectionMatrix();
  document.getElementById('level').textContent = level;

  for (const o of [walls, floor, exitMesh]) if (o) scene.remove(o);
  walls = new THREE.Group();
  maze = genMaze(SIZE);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x8fa3c8, roughness: 0.85 });
  const geo = new THREE.BoxGeometry(CELL, WALL_H, CELL);
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
    if (!maze[y][x]) continue;
    const m = new THREE.Mesh(geo, wallMat);
    m.position.set(x * CELL, WALL_H / 2, y * CELL);
    m.castShadow = m.receiveShadow = true;
    walls.add(m);
  }
  scene.add(walls);

  floor = new THREE.Mesh(
    new THREE.PlaneGeometry(SIZE * CELL, SIZE * CELL),
    new THREE.MeshStandardMaterial({ map: makeFloorTexture(), roughness: 1 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.set((SIZE-1)/2 * CELL, 0, (SIZE-1)/2 * CELL);
  floor.receiveShadow = true;
  scene.add(floor);

  exitPos = new THREE.Vector3((SIZE-2) * CELL, 1.2, (SIZE-2) * CELL);
  exitMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 32, 32),
    new THREE.MeshStandardMaterial({ color: 0xffc233, emissive: 0xff9900, emissiveIntensity: 1.5 })
  );
  exitMesh.position.copy(exitPos);
  exitLight = new THREE.PointLight(0xffaa33, 3, 22);
  exitMesh.add(exitLight);
  scene.add(exitMesh);

  playerPos.set(CELL, 0, CELL);
  camYaw = Math.PI * 0.75; camPitch = 0.35;
}

// ---- 角色 ----
function buildFallbackCharacter() {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 0.5, 4, 12),
    new THREE.MeshStandardMaterial({ color: 0xf27326 }));
  body.position.y = 0.95;
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 20, 16),
    new THREE.MeshStandardMaterial({ color: 0xffdfba }));
  head.position.y = 1.6;
  g.add(body, head);
  g.traverse(o => { if (o.isMesh) o.castShadow = true; });
  return g;
}

function onCharacterLoaded(p) {
  player = p;
  window.player = p;
  player.traverse(o => { if (o.isMesh) o.castShadow = true; });
  for (const n of ['ArmL','ArmR','LegL','LegR','Body','Head']) {
    const o = player.getObjectByName(n);
    if (o) parts[n] = o;
  }
  scene.add(player);
}

const gltfLoader = new GLTFLoader();
gltfLoader.load('character.glb', g => onCharacterLoaded(g.scene), undefined, () => {
  gltfLoader.load('boss.glb', g => onCharacterLoaded(g.scene), undefined,
    () => onCharacterLoaded(buildFallbackCharacter()));
});

// ---- 碰撞 ----
function collide(px, pz) {
  const r = 0.55;
  const gx = Math.round(px / CELL), gz = Math.round(pz / CELL);
  for (let y = gz - 1; y <= gz + 1; y++) for (let x = gx - 1; x <= gx + 1; x++) {
    if (y < 0 || x < 0 || y >= SIZE || x >= SIZE || !maze[y][x]) continue;
    const cx = Math.max(x*CELL - CELL/2, Math.min(px, x*CELL + CELL/2));
    const cz = Math.max(y*CELL - CELL/2, Math.min(pz, y*CELL + CELL/2));
    if ((px-cx)**2 + (pz-cz)**2 < r*r) return true;
  }
  return false;
}

// ---- 输入 ----
const keys = {};
let camYaw = 0, camPitch = 0.35, charAngle = 0;
addEventListener('keydown', e => keys[e.code] = true);
addEventListener('keyup', e => keys[e.code] = false);
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const startEl = document.getElementById('start');
const winEl = document.getElementById('win');
startEl.addEventListener('click', () => { level = 1; startGame(); document.body.requestPointerLock(); });
winEl.addEventListener('click', () => { level++; startGame(); document.body.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => {
  startEl.style.display = (!document.pointerLockElement && !won) ? 'flex' : 'none';
});
document.addEventListener('mousemove', e => {
  if (!document.pointerLockElement) return;
  camYaw -= e.movementX * 0.0028;
  camPitch = Math.max(-0.1, Math.min(1.3, camPitch + e.movementY * 0.0028));
});

function startGame() {
  build();
  won = false; playing = true;
  startTime = performance.now();
  startEl.style.display = 'none';
  winEl.style.display = 'none';
  for (const k in keys) keys[k] = false;
}

// ---- 小地图 ----
const mm = document.getElementById('minimap').getContext('2d');
function drawMinimap() {
  const s = 160 / SIZE;
  mm.fillStyle = 'rgba(20,26,40,.9)';
  mm.fillRect(0, 0, 160, 160);
  mm.fillStyle = '#7d92bd';
  for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++)
    if (maze[y][x]) mm.fillRect(x*s, y*s, s, s);
  if (showExitOnMap) {
    mm.fillStyle = '#ffc233';
    mm.beginPath(); mm.arc(exitPos.x/CELL*s+s/2, exitPos.z/CELL*s+s/2, 4, 0, 7); mm.fill();
  }
  mm.fillStyle = '#5aff8a';
  mm.beginPath(); mm.arc(playerPos.x/CELL*s+s/2, playerPos.z/CELL*s+s/2, 4, 0, 7); mm.fill();
}

// ---- 主循环 ----
const timeEl = document.getElementById('time');
const clock = new THREE.Clock();
let walkT = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  let moving = false;

  if (playing && document.pointerLockElement && player) {
    const speed = (keys.ShiftLeft || keys.ShiftRight ? 9 : 5.5) * dt;
    const fx = -Math.sin(camYaw), fz = -Math.cos(camYaw);
    const rx = Math.cos(camYaw), rz = -Math.sin(camYaw);
    let mx = 0, mz = 0;
    if (keys.KeyW) { mx += fx; mz += fz; }
    if (keys.KeyS) { mx -= fx; mz -= fz; }
    if (keys.KeyA) { mx -= rx; mz -= rz; }
    if (keys.KeyD) { mx += rx; mz += rz; }
    const len = Math.hypot(mx, mz);
    if (len > 0) {
      moving = true;
      mx /= len; mz /= len;
      const nx = playerPos.x + mx * speed;
      const nz = playerPos.z + mz * speed;
      if (!collide(nx, playerPos.z)) playerPos.x = nx;
      if (!collide(playerPos.x, nz)) playerPos.z = nz;
      const target = Math.atan2(mx, mz);
      let d = target - charAngle;
      while (d > Math.PI) d -= 2 * Math.PI;
      while (d < -Math.PI) d += 2 * Math.PI;
      charAngle += d * Math.min(1, dt * 12);
      walkT += dt * (keys.ShiftLeft ? 14 : 10);
    }

    if (!won && playerPos.distanceTo(new THREE.Vector3(exitPos.x, 0, exitPos.z)) < 1.8) {
      won = true; playing = false;
      document.exitPointerLock();
      document.getElementById('win-title').textContent = '🎉 第 ' + level + ' 关完成!';
      document.getElementById('win-btn').textContent = '进入第 ' + (level + 1) + ' 关';
      document.getElementById('win-time').textContent =
        '用时 ' + ((performance.now() - startTime) / 1000).toFixed(1) + ' 秒';
      winEl.style.display = 'flex';
    }
    if (!won) timeEl.textContent = ((performance.now() - startTime) / 1000).toFixed(1);
  }

  if (player) {
    player.position.copy(playerPos);
    player.rotation.y = charAngle;
    const sw = moving ? Math.sin(walkT) * 0.7 : 0;
    if (parts.ArmL) parts.ArmL.rotation.x = sw;
    if (parts.ArmR) parts.ArmR.rotation.x = -sw;
    if (parts.LegL) parts.LegL.rotation.x = -sw;
    if (parts.LegR) parts.LegR.rotation.x = sw;
    player.position.y = moving ? Math.abs(Math.sin(walkT)) * 0.08 : 0;
  }

  // 第三人称相机
  const dist = 7, cp = Math.cos(camPitch), sp = Math.sin(camPitch);
  camera.position.set(
    playerPos.x + Math.sin(camYaw) * dist * cp,
    1.5 + dist * sp,
    playerPos.z + Math.cos(camYaw) * dist * cp
  );
  if (camera.position.y < 0.5) camera.position.y = 0.5;
  camera.lookAt(playerPos.x, 1.4, playerPos.z);

  if (exitMesh) { exitMesh.rotation.y += dt * 2; exitMesh.position.y = 1.2 + Math.sin(performance.now()/400) * 0.2; }
  drawMinimap();
  renderer.render(scene, camera);
}

build();
animate();
</script>
</body>
</html>
